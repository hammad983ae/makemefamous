<!doctype html>
<html lang="en">

<head>
  <!-- The first thing in any HTML file should be the charset -->
  <meta charset="utf-8">

  <!-- Make the page mobile compatible -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Allow installing the app to the homescreen -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Primary SEO -->
  <title>Make Me Famous | Marketing That Gets You Noticed</title>
  <meta name="description" content="Make Me Famous is a marketing studio helping brands get noticed and grow with strategy, creative, SEO, and paid media.">
  <meta name="theme-color" content="#000000">
  <meta name="robots" content="index,follow">

  <!-- Canonical (single-page app default) -->
  <link rel="canonical" href="https://www.makemefamous.net/">

  <!-- Open Graph -->
  <meta property="og:site_name" content="Make Me Famous">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Make Me Famous | Marketing That Gets You Noticed">
  <meta property="og:description" content="Make Me Famous is a marketing studio helping brands get noticed and grow with strategy, creative, SEO, and paid media.">
  <meta property="og:url" content="https://www.makemefamous.net/">
  <meta property="og:image" content="https://www.makemefamous.net/favicon.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Make Me Famous | Marketing That Gets You Noticed">
  <meta name="twitter:description" content="Make Me Famous is a marketing studio helping brands get noticed and grow with strategy, creative, SEO, and paid media.">
  <meta name="twitter:image" content="https://www.makemefamous.net/favicon.png">

  <link rel="icon" href="/favicon.png" type="image/png" />
</head>

<body>
  <!-- Display a message if JS has been disabled on the browser. -->
  <noscript>If you're seeing this message, that means
    <strong>JavaScript has been disabled on your browser</strong>, please
    <strong>enable JS</strong> to make this app work.</noscript>

  <!-- The app hooks into this div -->
  <div id="app"></div>
  <!-- A lot of magic happens in this file. HtmlWebpackPlugin automatically injects all assets (e.g. bundle.js, main.css) with the correct HTML tags, which is why they are missing in this file. Don't add any assets here! (Check out webpack.dev.babel.js and webpack.prod.babel.js if you want to know more) -->
</body>

</html>
